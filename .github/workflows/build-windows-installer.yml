name: Build Windows installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Installer version (for example 3.29.0)
        required: false
        default: 0.0.0-dev
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run test suite
        run: python tools/check.py

      - name: Prepare reviewed builds
        run: >
          python buildgen/party.py buildgen/party.allflame.json
          --out-dir builds/allflame

      - name: Download zone-layout pack
        run: python tools/fetch_layouts.py

      - name: Freeze desktop application
        run: >
          python -m PyInstaller packaging/poe_league_tools.spec
          --noconfirm --clean

      - name: Smoke-test packaged application
        shell: pwsh
        run: '& ".\dist\PoE League Tools\PoE League Tools.exe" --self-test'

      - name: Install Inno Setup
        shell: pwsh
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --no-progress -y
          }

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          if (-not $version) {
            $version = "0.0.${{ github.run_number }}"
          }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" packaging\poe_league_tools.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoE-League-Tools-Setup
          path: dist/installer/PoE-League-Tools-Setup.exe
          if-no-files-found: error

      - name: Attach installer to tagged release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }
          gh release upload $tag `
            dist\installer\PoE-League-Tools-Setup.exe --clobber
